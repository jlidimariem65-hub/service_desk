 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Desk - BH Banque</title>

<link rel="icon" href="{{ url_for('static', filename='bh.png') }}" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Poppins', Arial, sans-serif;
  background-image: url("/static/background.png");
  background-position: center;
  background-attachment: fixed;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  position: relative;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(12px);
  padding: 70px 40px 36px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 64, 128, 0.18);
  width: 420px;
  border: 1.5px solid rgba(255,255,255,0.7);
}

.avatar {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  position: absolute;
  top: -42px;
  left: calc(50% - 42px);
  border: 4px solid white;
}

.logo-top-left {
  position: absolute;
  top: 12px;
  left: 14px;
  width: 52px;
}

h1 {
  color: #004080;
  text-align: center;
  margin-bottom: 20px;
}

label {
  margin-top: 12px;
  display: block;
  font-weight: 600;
}

input[type=text], input[type=date] {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.radio-group {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: #004080;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #0066cc;
}

/* FLASH MESSAGE */
.message {
  margin-top: 15px;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.9rem;
}

.success {
  background: #dcfce7;
  color: #166534;
}

.error {
  background: #fee2e2;
  color: #991b1b;
}
</style>
</head>

<body>

<div class="container">

  <img src="/static/avatar.png" class="avatar">
  <img src="/static/bh.png" class="logo-top-left">

  <h1>Service Desk — BH Banque</h1>

  <!-- ✅ FORM CONNECTED TO FLASK -->
  <form action="/add_ticket" method="POST">

    <label>Date de service</label>
    <input type="date" name="date_service" required>

    <label>Objet</label>
    <input type="text" name="objet" required>

    <label>Détails</label>
    <input type="text" name="details" required>

    
    <label>Priorité</label>
    <input type="text" name="priorite" required>

   

    <button type="submit">Créer ticket✅ </button>

  </form>


  <br>
  <a href="/logout" style="display:block;text-align:center;">Logout</a>

</div>

</body>
</html>
